<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculatrice Node.js</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #1e1e2e;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .calculator {
        background: #2a2a3d;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        width: 340px;
      }
      h1 {
        color: #cdd6f4;
        text-align: center;
        margin-bottom: 20px;
        font-size: 1.4rem;
        letter-spacing: 1px;
      }
      .display {
        background: #1e1e2e;
        border-radius: 12px;
        padding: 15px 20px;
        margin-bottom: 20px;
        text-align: right;
      }
      .display #expression {
        color: #6c7086;
        font-size: 0.9rem;
        min-height: 20px;
      }
      .display #result {
        color: #cdd6f4;
        font-size: 2rem;
        font-weight: bold;
        word-break: break-all;
      }
      .inputs {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
      }
      .inputs input {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #313244;
        color: #cdd6f4;
        font-size: 1.1rem;
        text-align: center;
        outline: none;
      }
      .inputs input:focus {
        border: 2px solid #89b4fa;
      }
      .buttons {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
      button {
        padding: 16px;
        border: none;
        border-radius: 12px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        transition:
          transform 0.1s,
          opacity 0.2s;
      }
      button:active {
        transform: scale(0.95);
      }
      .btn-add {
        background: #a6e3a1;
        color: #1e1e2e;
      }
      .btn-subtract {
        background: #f38ba8;
        color: #1e1e2e;
      }
      .btn-multiply {
        background: #fab387;
        color: #1e1e2e;
      }
      .btn-divide {
        background: #89b4fa;
        color: #1e1e2e;
      }
      .btn-clear {
        background: #585b70;
        color: #cdd6f4;
        grid-column: span 2;
      }
    </style>
  </head>
  <body>
    <div class="calculator">
      <h1>Calculatrice</h1>
      <div class="display">
        <div id="expression"></div>
        <div id="result">0</div>
      </div>
      <div class="inputs">
        <input type="number" id="numA" placeholder="a" />
        <input type="number" id="numB" placeholder="b" />
      </div>
      <div class="buttons">
        <button class="btn-add" onclick="calc('add')">+ Addition</button>
        <button class="btn-subtract" onclick="calc('subtract')">
          − Soustraction
        </button>
        <button class="btn-multiply" onclick="calc('multiply')">
          × Multiplication
        </button>
        <button class="btn-divide" onclick="calc('divide')">÷ Division</button>
        <button class="btn-clear" onclick="clear()">C Effacer</button>
      </div>
    </div>

    <script>
      const ops = { add: "+", subtract: "−", multiply: "×", divide: "÷" };

      async function calc(op) {
        const a = document.getElementById("numA").value;
        const b = document.getElementById("numB").value;
        if (a === "" || b === "") {
          document.getElementById("result").textContent = "Entrez a et b";
          return;
        }
        try {
          const res = await fetch(`/${op}?a=${a}&b=${b}`);
          const data = await res.json();
          if (data.error) {
            document.getElementById("expression").textContent = "";
            document.getElementById("result").textContent = "⚠ " + data.error;
          } else {
            document.getElementById("expression").textContent =
              `${a} ${ops[op]} ${b} =`;
            document.getElementById("result").textContent = data.result;
          }
        } catch (e) {
          document.getElementById("result").textContent = "Erreur réseau";
        }
      }

      function clear() {
        document.getElementById("numA").value = "";
        document.getElementById("numB").value = "";
        document.getElementById("expression").textContent = "";
        document.getElementById("result").textContent = "0";
      }
    </script>
  </body>
</html>
